name: Publish Recipe

on:
  issues:
    types: [opened, edited]

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract slug + HTML
        id: extract
        run: |
          set -euo pipefail
          BODY="${{ github.event.issue.body }}"
          BODY="$(printf "%s" "$BODY" | tr -d '\r')"

          SLUG="$(printf "%s\n" "$BODY" \
            | sed -n '/<!-- SLUG START -->/,/<!-- SLUG END -->/p' \
            | sed '1d;$d' | head -n 1 | xargs)"

          HTML="$(printf "%s\n" "$BODY" \
            | sed -n '/<!-- HTML START -->/,/<!-- HTML END -->/p' \
            | sed '1d;$d')"

          echo "slug=$SLUG" >> "$GITHUB_OUTPUT"

          mkdir -p recipes
          printf "%s" "$HTML" > "recipes/$SLUG.html"
          printf "%s" "$HTML" > "recipes/$SLUG.txt"

      - name: Commit & Push
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add recipes/
          if git diff --cached --quiet; then
            echo "No changes."
            exit 0
          fi
          git commit -m "Publish recipe: ${{ steps.extract.outputs.slug }}"
          git push
