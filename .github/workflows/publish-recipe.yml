name: Publish Recipe

on:
  issues:
    types: [opened, edited]

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract slug + HTML
        id: extract
        run: |
          set -euo pipefail
          BODY="${{ github.event.issue.body }}"
          BODY="$(printf "%s" "$BODY" | tr -d '\r')"

          SLUG="$(printf "%s\n" "$BODY" \
            | sed -n '/<!-- SLUG START -->/,/<!-- SLUG END -->/p' \
            | sed '1d;$d' | head -n 1 | xargs)"

          HTML="$(printf "%s\n" "$BODY" \
            | sed -n '/<!-- HTML START -->/,/<!-- HTML END -->/p' \
            | sed '1d;$d')"

          echo "slug=$SLUG" >> "$GITHUB_OUTPUT"

          mkdir -p recipes
          printf "%s" "$HTML" > "recipes/$SLUG.html"

          # -------- Build /recipes/index.html archive --------
          INDEX="recipes/index.html"
          {
            echo '<!doctype html>'
            echo '<html lang="en">'
            echo '<head>'
            echo '  <meta charset="utf-8">'
            echo '  <meta name="viewport" content="width=device-width, initial-scale=1">'
            echo '  <title>Recipe Archive</title>'
            echo '  <style>'
            echo '    body { font-family: system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif; max-width: 900px; margin: 40px auto; padding: 0 16px; }'
            echo '    ul { line-height: 1.8; }'
            echo '    a { text-decoration: none; }'
            echo '    a:hover { text-decoration: underline; }'
            echo '  </style>'
            echo '</head>'
            echo '<body>'
            echo '  <h1>Recipe Archive</h1>'
            echo '  <ul>'

            for f in recipes/*.html; do
              [ "$(basename "$f")" = "index.html" ] && continue
              file="$(basename "$f")"
              title="$(grep -m1 -oP "(?<=<title>).*?(?=</title>)" "$f" 2>/dev/null || true)"
              [ -z "$title" ] && title="${file%.html}"
              printf '    <li><a href="%s">%s</a></li>\n' "$file" "$title"
            done

            echo '  </ul>'
            echo '</body>'
            echo '</html>'
          } > "$INDEX"

      - name: Commit & Push
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add recipes/
          if git diff --cached --quiet; then
            echo "No changes."
            exit 0
          fi
          git commit -m "Publish recipe: ${{ steps.extract.outputs.slug }}"
          git push
