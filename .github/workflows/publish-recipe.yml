name: Publish Recipe

on:
  issues:
    types: [opened, edited]

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract slug + HTML
        id: extract
        env:
          ISSUE_BODY: ${{ github.event.issue.body }}
        shell: bash
        run: |
          set -euo pipefail

          BODY="$ISSUE_BODY"
          BODY="$(printf "%s" "$BODY" | tr -d '\r')"

          SLUG="$(printf "%s\n" "$BODY" \
            | sed -n '/<!-- SLUG START -->/,/<!-- SLUG END -->/p' \
            | sed '1d;$d' | head -n 1 | xargs)"

          HTML="$(printf "%s\n" "$BODY" \
            | sed -n '/<!-- HTML START -->/,/<!-- HTML END -->/p' \
            | sed '1d;$d')"

          echo "slug=$SLUG" >> "$GITHUB_OUTPUT"

          mkdir -p recipes
          printf "%s" "$HTML" > "recipes/$SLUG.html"

          # -------- Build root index.html archive --------
          shopt -s nullglob

          INDEX="index.html"

          printf '%s\n' '<!doctype html>' '<html lang="en">' '<head>' \
            '  <meta charset="utf-8">' \
            '  <meta name="viewport" content="width=device-width, initial-scale=1">' \
            '  <title>Recipe Archive</title>' \
            '  <style>' \
            '    body { font-family: system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif; max-width: 900px; margin: 40px auto; padding: 0 16px; }' \
            '    ul { line-height: 1.8; }' \
            '    a { text-decoration: none; }' \
            '    a:hover { text-decoration: underline; }' \
            '  </style>' \
            '</head>' '<body>' \
            '  <h1>Recipe Archive</h1>' \
            '  <ul>' > "$INDEX"

          for f in recipes/*.html; do
            file="$(basename "$f")"
            [[ "$file" == "index.html" ]] && continue

            title="$(sed -n 's/.*<title>\(.*\)<\/title>.*/\1/p' "$f" | head -n 1 || true)"
            [[ -z "${title:-}" ]] && title="${file%.html}"

            printf '    <li><a href="recipes/%s">%s</a></li>\n' "$file" "$title" >> "$INDEX"
          done

          printf '%s\n' '  </ul>' '</body>' '</html>' >> "$INDEX"

      - name: Commit & Push
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add index.html recipes/
          if git diff --cached --quiet; then
            echo "No changes."
            exit 0
          fi
          git commit -m "Publish recipe: ${{ steps.extract.outputs.slug }}"
          git push
